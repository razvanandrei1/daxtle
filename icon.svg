<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Warm sand background -->
  <rect width="1024" height="1024" fill="#F5F0E3"/>

  <!-- Motion trail — 4 ghost blocks, same height as main block, fading left to right -->
  <rect x="100" y="368" width="148" height="288" rx="20" fill="#D46154" opacity="0.10"/>
  <rect x="268" y="368" width="148" height="288" rx="20" fill="#D46154" opacity="0.25"/>
  <rect x="436" y="368" width="148" height="288" rx="20" fill="#D46154" opacity="0.45"/>
  <rect x="604" y="368" width="148" height="288" rx="20" fill="#D46154" opacity="0.68"/>

  <!-- Main block -->
  <rect x="680" y="352" width="244" height="320" rx="24" fill="#D46154"/>

  <!-- Direction arrow — filled triangle pointing right -->
  <polygon points="858,512 748,424 748,600" fill="#94443B"/>
</svg>
